            <h1>iFrames</h1>
            <p>Uso de iFrames dentro de nuestro sitio web</p>

        <section>
            <h2>iFrames</h2>

            <!-- 1. Incrustar otra página web -->
            <article>
                <h3>Sitio Web Interno</h3>
                <iframe src="http://ufidelitas.ac.cr"
                        height="400"
                        width="1200">
                </iframe>
            </article>

            <!-- 2. Incrustar un video de YouTube -->
            <article>
                <h3>YouTube</h3>
                <iframe width="1236"
                        height="695"
                        src="https://www.youtube.com/embed/yScNIsLTLYA"
                        title="Video de YouTube"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                </iframe>
            </article>

            <!-- 3. Incrustar un mapa de Google Maps -->
            <article>
                <h3>Ubícanos</h3>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15717.138115551783!2d-84.00616509999999!3d9.9933394!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8fa0e66128c5f425%3A0x34e639cd116a577e!2sF%C3%A1brica%20Nacional%20de%20Banderas!5e0!3m2!1sen!2scr!4v1748033891099!5m2!1sen!2scr"
                        width="800"
                        height="600"
                        style="border:0;"
                        allowfullscreen=""
                        referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </article>
        </section>
