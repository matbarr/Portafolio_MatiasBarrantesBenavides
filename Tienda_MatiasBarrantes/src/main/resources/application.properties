spring.application.name=tienda

# Puerto 80 permite acceder como "localhost" sin número de puerto
server.port=8080

# Formato de hora en el log de la consola
logging.pattern.dateformat=hh:mm

# Elimina el banner de Spring al arrancar
spring.main.banner-mode=off

# En desarrollo usar false; en producción cambiar a true
spring.thymeleaf.cache=false

# Conexión local a la BD Techshop en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/techshop
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.

# Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostrar información en el log (útil para depuración)
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#Esta información se utiliza para obtener acceso a su storage.

firebase.bucket.name=tecshop-16165.firebasestorage.app
firebase.storage.path=techshop
firebase.json.path=firebase
firebase.json.file=tecshop-16165-firebase-adminsdk-fbsvc-ecd1f1a926